<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📍 Check-In Kehadiran</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/signature_pad/4.1.5/signature_pad.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .current-time {
            font-size: 28px;
            font-weight: 700;
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Segoe UI', sans-serif;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
            background-color: #f1f8f4;
        }

        .signature-section {
            margin: 30px 0;
            border: 2px dashed #4CAF50;
            border-radius: 10px;
            padding: 20px;
            background: #f1f8f4;
        }

        .signature-section label {
            margin-bottom: 15px;
        }

        .signature-help {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        #signaturePad {
            border: 2px solid #4CAF50;
            border-radius: 8px;
            background: white;
            cursor: crosshair;
            display: block;
            width: 100%;
            height: 150px;
            touch-action: none;
        }

        .signature-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-clear {
            background: #ff6b6b;
            color: white;
            flex: 1;
        }

        .btn-clear:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            width: 100%;
            font-size: 15px;
            padding: 16px 30px;
            margin-top: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .success-message {
            background: #c8e6c9;
            color: #2e7d32;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #4CAF50;
            display: none;
            animation: slideDown 0.3s ease-out;
            text-align: center;
            font-weight: 600;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .footer-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-link a:hover {
            color: #45a049;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 24px;
            }

            .current-time {
                font-size: 22px;
            }

            .content {
                padding: 25px;
            }

            #signaturePad {
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 CHECK-IN</h1>
            <div class="subtitle">Selamat Datang! Silakan Absen Masuk</div>
            <div class="current-time" id="currentTime">--:--:--</div>
        </div>

        <div class="content">
            <div class="success-message" id="successMessage">
                ✓ Check-In berhasil! Sampai jumpa di sore hari untuk Check-Out.
            </div>

            <form id="checkinForm">
                <!-- Nama Karyawan -->
                <div class="form-group">
                    <label for="namaKaryawan">👤 Nama Lengkap</label>
                    <input type="text" id="namaKaryawan" placeholder="Masukkan nama lengkap Anda" required autofocus>
                </div>

                <!-- Jam Check-In (Auto) -->
                <div class="form-group">
                    <label>⏰ Jam Check-In</label>
                    <div style="background: #f1f8f4; padding: 15px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 12px; color: #666; margin-bottom: 5px;">Waktu Masuk Anda</div>
                        <div style="font-size: 28px; font-weight: 700; color: #4CAF50;" id="displayJamCheckin">--:--</div>
                    </div>
                </div>

                <!-- Tanda Tangan -->
                <div class="signature-section">
                    <label>✍️ Tanda Tangan Digital</label>
                    <p class="signature-help">Silakan tanda tangan di area di bawah ini untuk konfirmasi kehadiran</p>
                    <canvas id="signaturePad"></canvas>
                    <div class="signature-actions">
                        <button type="button" class="btn btn-clear" onclick="clearSignature()">🗑️ Bersihkan</button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary">✓ KONFIRMASI CHECK-IN</button>

                <div class="footer-link">
                    <a href="absensi_dashboard.html">📊 Lihat Daftar Absensi</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        let signaturePad;
        const canvas = document.getElementById('signaturePad');

        // Initialize Signature Pad
        function initSignaturePad() {
            function resizeCanvas() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = canvas.offsetWidth * ratio;
                canvas.height = canvas.offsetHeight * ratio;
                canvas.getContext('2d').scale(ratio, ratio);
            }

            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            signaturePad = new SignaturePad(canvas, {
                backgroundColor: 'rgba(255,255,255,0)',
                penColor: '#4CAF50'
            });
        }

        // Update jam setiap detik
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('displayJamCheckin').textContent = `${hours}:${minutes}`;
        }

        setInterval(updateTime, 1000);
        updateTime();

        // Clear signature
        function clearSignature() {
            signaturePad.clear();
        }

        // Form submission
        document.getElementById('checkinForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nama = document.getElementById('namaKaryawan').value.trim();
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const jamCheckin = `${hours}:${minutes}`;

            if (!nama) {
                alert('Silakan isi nama terlebih dahulu');
                return;
            }

            if (signaturePad.isEmpty()) {
                alert('Silakan tanda tangan terlebih dahulu');
                return;
            }

            // Get signature
            const signatureData = canvas.toDataURL('image/png');

            // Buat object checkin
            const checkin = {
                id: Date.now(),
                nama: nama,
                tanggal: new Date().toLocaleDateString('id-ID'),
                jamCheckin: jamCheckin,
                jamCheckout: null,
                signatureCheckin: signatureData,
                signatureCheckout: null,
                status: 'checkin'
            };

            // Simpan ke localStorage
            let dataAbsensi = JSON.parse(localStorage.getItem('dataAbsensi')) || [];
            
            // Cek apakah karyawan sudah checkin hari ini
            const existingIndex = dataAbsensi.findIndex(d => 
                d.nama === nama && d.tanggal === checkin.tanggal && d.jamCheckout === null
            );

            if (existingIndex !== -1) {
                // Update yang existing
                dataAbsensi[existingIndex] = {
                    ...dataAbsensi[existingIndex],
                    jamCheckin: jamCheckin,
                    signatureCheckin: signatureData,
                    status: 'checkin'
                };
            } else {
                // Tambah yang baru
                dataAbsensi.push(checkin);
            }

            localStorage.setItem('dataAbsensi', JSON.stringify(dataAbsensi));

            // Tampilkan success message
            const msg = document.getElementById('successMessage');
            msg.classList.add('show');

            // Reset form
            document.getElementById('checkinForm').reset();
            signaturePad.clear();

            // Redirect setelah 2 detik
            setTimeout(() => {
                // window.location.href = 'absensi_dashboard.html';
            }, 2000);
        });

        // Init
        initSignaturePad();
    </script>
</body>
</html>
